version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: djangoauthapi1/Dockerfile
    container_name: recommendation-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=djangoauthapi1.settings
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    volumes:
      - ./djangoauthapi1:/app
    command: bash -lc "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./FroentEnd(react)
      dockerfile: Dockerfile
    container_name: recommendation-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
